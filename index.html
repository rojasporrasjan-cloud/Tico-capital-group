            Usamos cookies para mejorar tu experiencia de navegación. Puedes aceptar todas o solo las esenciales.
          </p>
        </div>

        <button id="cookie-reject">Solo esenciales</button>
        <button id="cookie-accept">Aceptar todo</button>
      </div>
    </div>

    <script>
      (function() {
        var STORAGE_KEY = 'tcg_cookie_consent';
        var banner = document.getElementById('cookie-banner');
        var msgEl  = document.getElementById('cookie-msg');
        var rejectBtn = document.getElementById('cookie-reject');
        var acceptBtn = document.getElementById('cookie-accept');

        // Detect language from URL or localStorage
        var lang = (location.search.indexOf('lang=en') > -1 ||
                    (typeof localStorage !== 'undefined' && localStorage.getItem('lang') === 'en'))
                   ? 'en' : 'es';

        if (lang === 'en') {
          msgEl.textContent = 'We use cookies to improve your browsing experience. You can accept all or only the essential ones.';
          rejectBtn.textContent = 'Essential only';
          acceptBtn.textContent = 'Accept all';
          banner.setAttribute('aria-label', 'Cookie consent');
        }

        // Don't show if already decided
        if (localStorage.getItem(STORAGE_KEY)) return;

        // Show banner after short delay
        setTimeout(function() {
          banner.classList.add('visible');
        }, 800);

        function dismiss(choice) {
          localStorage.setItem(STORAGE_KEY, choice);
          banner.classList.add('hiding');
          setTimeout(function() {
            banner.style.display = 'none';
          }, 450);
        }

        acceptBtn.addEventListener('click', function() { dismiss('accepted'); });
        rejectBtn.addEventListener('click', function() { dismiss('rejected'); });
      })();
    </script>

    <div id="notify-overlay" role="dialog" aria-modal="true" aria-labelledby="notify-title">

          <p id="nt-subtitle">Te avisamos cuando se publique una nueva propiedad que podría interesarte.</p>
          <input id="notify-email" type="email" autocomplete="email" placeholder="tu@email.com" />
          <button id="notify-submit"><span id="nt-btn">ACTIVAR ALERTAS</span></button>
          <button id="notify-cancel" id="nt-cancel">Cancelar</button>
        </div>
        <div id="notify-success">
          <div class="ns-icon">✅</div>
          <h3 id="ns-title" style="font-family:Cormorant Garamond,Georgia,serif;font-size:20px;font-weight:400;color:#c9a96e;margin:0 0 6px">¡Listo!</h3>

    <script>
    (function() {
      var overlay   = document.getElementById('notify-overlay');
      var emailInp  = document.getElementById('notify-email');
      var submitBtn = document.getElementById('notify-submit');
      var cancelBtn = document.getElementById('notify-cancel');
      var formArea  = document.getElementById('notify-form-area');
      var successEl = document.getElementById('notify-success');

      var lang = (location.search.indexOf('lang=en') > -1 ||
                  (typeof localStorage !== 'undefined' && localStorage.getItem('lang') === 'en'))
                 ? 'en' : 'es';

      if (lang === 'en') {
        document.getElementById('nt-title').textContent    = 'Property Alerts';
        document.getElementById('nt-subtitle').textContent = 'We\'ll notify you when a new property matching your interests is published.';
        document.getElementById('nt-btn').textContent      = 'ACTIVATE ALERTS';
        document.getElementById('ns-title').textContent    = 'Done!';
        document.getElementById('ns-msg').textContent      = 'You will receive alerts for new exclusive properties.';
        emailInp.placeholder = 'your@email.com';
        cancelBtn.textContent = 'Cancel';
      }

      window._openNotifyModal = function() {
        overlay.classList.add('open');
        emailInp.focus();
      };

      function close() {
        overlay.classList.remove('open');
        setTimeout(function() {
          formArea.style.display = '';
          successEl.style.display = 'none';
          emailInp.value = '';
          submitBtn.disabled = false;
        }, 300);
      }

      cancelBtn.addEventListener('click', close);
      overlay.addEventListener('click', function(ev) {
        if (ev.target === overlay) close();
      });

      submitBtn.addEventListener('click', function() {
        var email = emailInp.value.trim();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          emailInp.style.borderColor = 'rgba(220,80,80,0.6)';
          setTimeout(function() { emailInp.style.borderColor = ''; }, 1500);
          return;
        }

        submitBtn.disabled = true;

        // Save to Firestore if available
        var saved = false;
        if (window._db && window._fsUtils) {
          var col = window._fsUtils.collection(window._db, 'notifications');
          window._fsUtils.addDoc(col, {
            email: email,
            lang: lang,
            status: 'active',
            createdAt: window._fsUtils.serverTimestamp()
          }).then(function() {
            saved = true;
          }).catch(function(e) {
            console.warn('Notification save failed:', e);
          });
        }

        // Always show success (graceful fallback if Firestore unavailable)
        formArea.style.display = 'none';
        successEl.style.display = 'block';
        setTimeout(close, 3000);
      });
    })();
    </script>

        /* Gallery thumbnails */
        + galleryHTML

        /* Description */
        + (prop.description ? '<div style="margin-bottom:24px">'
        +   '<p style="font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#866f43;margin:0 0 8px">'
        +   (isEN ? 'DESCRIPTION' : 'DESCRIPCIÓN') + '</p>'
        +   '<p style="font-size:11px;line-height:1.7;color:#444;margin:0">' + prop.description + '</p>'
        + '</div>' : '')

        /* Features */
        + featsHTML

        /* Footer */
        + '<div style="border-top:1px solid #e8e0d0;padding-top:16px;display:flex;justify-content:space-between;align-items:center">'
        +   '<div>'
        +     '<p style="font-size:8px;color:#aaa;letter-spacing:0.08em;margin:0">'
        +       (isEN ? 'Contact us for more information' : 'Contáctenos para más información')
        +     '</p>'
        +     '<p style="font-size:9px;color:#866f43;letter-spacing:0.06em;margin:3px 0 0">ticocapitalgroup@gmail.com · +506 7180-5506</p>'
        +   '</div>'
        +   '<p style="font-size:7px;color:#ccc;margin:0;letter-spacing:0.06em">'
        +   (isEN ? 'This document is for informational purposes only' : 'Documento informativo · Precios sujetos a cambio')
        +   '</p>'
        + '</div>'

        + '</div>' /* /content */
        + '</div>'; /* /page */

      /* Print and clean up */
      setTimeout(function() {
        window.print();
        setTimeout(function() { container.innerHTML = ''; }, 1000);
      }, 200);
    };
    </script>
    <!-- ── /PDF Ficha System ───────────────────────────────────────────────── -->

  </body>
</html>
